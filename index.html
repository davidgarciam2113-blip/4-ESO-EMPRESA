<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>4º ESO + Empresa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h1 {
  margin-bottom: 20px;
}

input {
  padding: 12px;
  font-size: 16px;
  width: 60%;
  margin-right: 10px;
}

button {
  padding: 12px;
  font-size: 16px;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  padding: 20px;
  border-radius: 15px;
  background: #ecfdf5;
}

.error {
  margin-top: 20px;
  padding: 20px;
  border-radius: 15px;
  background: #fee2e2;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

function App() {

const alumnos = {

"K7P4": {empresa:"Centro Salud Loeches",direccion:"Calle Virgen de las Angustias s/n, Loeches",horario:"Lunes a Jueves 09:00-14:00"},

"C8F3": {empresa:"TAFAD Madrid",direccion:"Av. Cristóbal Colón 54, Torrejón",horario:"Lunes a Jueves 08:30-14:30"},

"H4P6": {empresa:"Universidad de Alcalá",direccion:"Plaza San Diego s/n, Alcalá de Henares",horario:"Lunes a Jueves 09:00-14:00"},

"C4L8": {empresa:"Universidad Politécnica de Madrid",direccion:"Av. Complutense 30, Madrid",horario:"24-26 Marzo 10:00-14:00"},

/* POLICÍA LOCAL */

"Q5C7": {empresa:"Policía Local Loeches",direccion:"C. Molino 29, Loeches",horario:"23/03 09:00-14:00 | 24/03 09:00-14:00 | 25/03 15:00-19:00 | 26/03 15:00-19:00"},
"S9V4": {empresa:"Policía Local Loeches",direccion:"C. Molino 29, Loeches",horario:"23/03 09:00-14:00 | 24/03 09:00-14:00 | 25/03 15:00-19:00 | 26/03 15:00-19:00"},
"J6R3": {empresa:"Policía Local Loeches",direccion:"C. Molino 29, Loeches",horario:"23/03 09:00-14:00 | 24/03 09:00-14:00 | 25/03 15:00-19:00 | 26/03 15:00-19:00"},
"U2K8": {empresa:"Policía Local Loeches",direccion:"C. Molino 29, Loeches",horario:"23/03 09:00-14:00 | 24/03 09:00-14:00 | 25/03 15:00-19:00 | 26/03 15:00-19:00"},
"M6Q3": {empresa:"Policía Local Loeches",direccion:"C. Molino 29, Loeches",horario:"23/03 09:00-14:00 | 24/03 09:00-14:00 | 25/03 15:00-19:00 | 26/03 15:00-19:00"},

"F3K6": {empresa:"Policía Local Loeches",direccion:"C. Molino 29, Loeches",horario:"23/03 15:00-19:00 | 24/03 15:00-19:00 | 25/03 09:00-14:00 | 26/03 09:00-14:00"},
"E7P8": {empresa:"Policía Local Loeches",direccion:"C. Molino 29, Loeches",horario:"23/03 15:00-19:00 | 24/03 15:00-19:00 | 25/03 09:00-14:00 | 26/03 09:00-14:00"},
"A4T9": {empresa:"Policía Local Loeches",direccion:"C. Molino 29, Loeches",horario:"23/03 15:00-19:00 | 24/03 15:00-19:00 | 25/03 09:00-14:00 | 26/03 09:00-14:00"},
"V4N7": {empresa:"Policía Local Loeches",direccion:"C. Molino 29, Loeches",horario:"23/03 15:00-19:00 | 24/03 15:00-19:00 | 25/03 09:00-14:00 | 26/03 09:00-14:00"},

/* OTROS */

"R9L2": {empresa:"Cador Espacios",direccion:"Calle Alcalá 226, Madrid",horario:"Lunes a Jueves 09:30-13:30"},

"M2C7": {empresa:"EI La Casita",direccion:"Calle Molino 1 y 3, Loeches",horario:"Lunes a Jueves 09:00-14:00"},

"P3W9": {empresa:"Toscana Arquitectos",direccion:"Ronda de Poniente 7, Torrejón",horario:"Lunes a Jueves 09:00-14:00"},

};

const [codigo,setCodigo]=React.useState("");
const [resultado,setResultado]=React.useState(null);
const [buscado,setBuscado]=React.useState(false);

const buscar=()=>{
  const c=codigo.toUpperCase().trim();
  setResultado(alumnos[c]);
  setBuscado(true);
}

return(
<div className="container">

<h1>4º ESO + Empresa</h1>

<input
value={codigo}
onChange={e=>setCodigo(e.target.value)}
placeholder="Introduce tu código"
/>

<button onClick={buscar}>Consultar</button>

{resultado &&
<div className="result">
<p><b>Empresa:</b> {resultado.empresa}</p>
<p><b>Dirección:</b> {resultado.direccion}</p>
<p><b>Horario:</b> {resultado.horario}</p>
</div>
}

{buscado && !resultado &&
<div className="error">
Código no válido
</div>
}

</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
