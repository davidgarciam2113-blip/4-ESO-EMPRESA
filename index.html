<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>4º ESO + Empresa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

input {
  padding: 12px;
  font-size: 16px;
  width: 60%;
  margin-right: 10px;
}

button {
  padding: 12px;
  font-size: 16px;
}

.result {
  margin-top: 20px;
  padding: 20px;
  border-radius: 15px;
  background: #ecfdf5;
}

.error {
  margin-top: 20px;
  padding: 20px;
  border-radius: 15px;
  background: #fee2e2;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

function App() {

const alumnos = {

"K7P4": { empresa:"Centro Salud Loeches", direccion:"Calle Virgen de las Angustias s/n, Loeches", horario:"L-J 09:00-14:00" },
"L9X2": { empresa:"Centro Salud Loeches", direccion:"Calle Virgen de las Angustias s/n, Loeches", horario:"L-J 09:00-14:00" },

"C8F3": { empresa:"TAFAD Madrid", direccion:"Av. Cristóbal Colón 54, Torrejón", horario:"L-J 08:30-14:30" },

"H4P6": { empresa:"UAH", direccion:"Plaza San Diego s/n, Alcalá", horario:"L-J 09:00-14:00" },

"C4L8": { empresa:"UPM", direccion:"Av. Complutense 30, Madrid", horario:"24-26 Marzo 10:00-14:00" },

"Q5C7": { empresa:"Policía Local Loeches", direccion:"C. Molino 29, Loeches", horario:"L-M 09:00-14:00 | X-J 15:00-19:00" },

"F3K6": { empresa:"Policía Local Loeches", direccion:"C. Molino 29, Loeches", horario:"L-M 15:00-19:00 | X-J 09:00-14:00" },

"V4N7": { empresa:"Policía Local Loeches", direccion:"C. Molino 29, Loeches", horario:"L-M 15:00-19:00 | X-J 09:00-14:00" },

"M6Q3": { empresa:"Policía Local Loeches", direccion:"C. Molino 29, Loeches", horario:"L-M 09:00-14:00 | X-J 15:00-19:00" },

"R9L2": { empresa:"Cador Espacios", direccion:"Calle Alcalá 226, Madrid", horario:"L-J 09:30-13:30" },

"M2C7": { empresa:"EI La Casita", direccion:"Calle Molino 1 y 3, Loeches", horario:"L-J 09:00-14:00" },
"A8L5": { empresa:"EI La Casita", direccion:"Calle Molino 1 y 3, Loeches", horario:"L-J 09:00-14:00" },

"P3W9": { empresa:"Toscana Arquitectos", direccion:"Ronda de Poniente 7, Torrejón", horario:"L-J 09:00-14:00" },

"M8P5": { empresa:"Toscana Arquitectos", direccion:"Ronda de Poniente 7, Torrejón", horario:"L-J 09:00-14:00" }

};

const [codigo, setCodigo] = React.useState("");
const [resultado, setResultado] = React.useState(null);
const [buscado, setBuscado] = React.useState(false);

const buscar = () => {
  const c = codigo.toUpperCase();
  setResultado(alumnos[c]);
  setBuscado(true);
};

return (
<div className="container">

<h2>4º ESO + Empresa</h2>

<input
  value={codigo}
  onChange={e => setCodigo(e.target.value)}
  placeholder="Introduce tu código"
/>

<button onClick={buscar}>Consultar</button>

{resultado && (
<div className="result">
<p><b>Empresa:</b> {resultado.empresa}</p>
<p><b>Dirección:</b> {resultado.direccion}</p>
<p><b>Horario:</b> {resultado.horario}</p>
</div>
)}

{buscado && !resultado && (
<div className="error">
Código no válido
</div>
)}

</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
