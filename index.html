<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>4º ESO + Empresa</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e8eefc 0%, #ffffff 50%, #e0f2fe 100%);
      min-height: 100vh;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 960px;
      background: rgba(255,255,255,0.97);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.12);
      border: 1px solid #fff;
    }

    .header {
      background: linear-gradient(90deg, #4f46e5, #0ea5e9);
      color: white;
      padding: 32px 24px;
    }

    .header p {
      margin: 0 0 8px 0;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .header h1 {
      margin: 0;
      font-size: 38px;
    }

    .header .sub {
      margin-top: 12px;
      font-size: 16px;
      line-height: 1.5;
      opacity: 0.95;
      max-width: 760px;
    }

    .content {
      padding: 24px;
    }

    .search-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .search-row input {
      flex: 1;
      min-width: 220px;
      padding: 16px;
      border-radius: 18px;
      border: 1px solid #cbd5e1;
      font-size: 16px;
      text-transform: uppercase;
    }

    .search-row button {
      padding: 16px 22px;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
    }

    .btn-primary {
      background: #4f46e5;
      color: white;
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #334155;
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }

    .step {
      padding: 16px;
      border-radius: 18px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
    }

    .step h3 {
      margin: 0 0 8px;
      font-size: 14px;
      color: #334155;
    }

    .step p {
      margin: 0;
      color: #475569;
      font-size: 14px;
      line-height: 1.5;
    }

    .result {
      border: 1px solid #bbf7d0;
      background: linear-gradient(135deg, #ecfdf5, #ffffff);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .result-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .badge {
      background: white;
      border: 1px solid #bbf7d0;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: bold;
      color: #15803d;
      font-size: 14px;
    }

    .result h2 {
      margin: 0;
      font-size: 28px;
      color: #1e293b;
    }

    .result small {
      color: #15803d;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .box {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 18px;
    }

    .box h4 {
      margin: 0 0 10px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
    }

    .box p {
      margin: 0;
      color: #0f172a;
      line-height: 1.5;
      white-space: pre-line;
    }

    .error {
      border: 1px solid #fecaca;
      background: #fff1f2;
      color: #be123c;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .footer-box {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 16px;
      color: #475569;
      font-size: 14px;
    }

    @media (max-width: 640px) {
      .header h1 { font-size: 30px; }
      .content { padding: 18px; }
      .search-row { flex-direction: column; }
      .search-row button { width: 100%; }
    }
  </style>
</head>

        "N4H6": {
          empresa: "EEI El Columpio, Loeches",
          direccion: "Pendiente de completar",
          horario: "Pendiente de completar"
        }
      };

      const [codigo, setCodigo] = React.useState("");
      const [resultado, setResultado] = React.useState(null);
      const [buscado, setBuscado] = React.useState(false);

      const buscarAlumno = () => {
        const limpio = codigo.trim().toUpperCase();
        setBuscado(true);
        setResultado(alumnos[limpio] || null);
      };

      const limpiar = () => {
        setCodigo("");
        setResultado(null);
        setBuscado(false);
      };

      const handleKeyDown = (e) => {
        if (e.key === "Enter") buscarAlumno();
      };

      return (
        <div className="card">
          <div className="header">
            <p>Programa educativo</p>
            <h1>4º ESO + Empresa</h1>
            <div className="sub">
              Escanea el QR del centro y escribe tu código personal para consultar tu empresa, dirección y horario de estancia.
            </div>
          </div>

          <div className="content">
            <div className="search-row">
              <input
                type="text"
                value={codigo}
                onChange={(e) => setCodigo(e.target.value)}
                onKeyDown={handleKeyDown}
                placeholder="Introduce tu código, por ejemplo: K7P4"
              />
              <button className="btn-primary" onClick={buscarAlumno}>Consultar</button>
              <button className="btn-secondary" onClick={limpiar}>Limpiar</button>
            </div>

            {!resultado && !buscado && (
              <div className="steps">
                <div className="step">
                  <h3>Paso 1</h3>
                  <p>Escanea el QR o entra en la web del centro.</p>
                </div>
                <div className="step">
                  <h3>Paso 2</h3>
                  <p>Introduce el código personal que te ha entregado el profesorado.</p>
                </div>
                <div className="step">
                  <h3>Paso 3</h3>
                  <p>Consulta tu empresa, dirección y horario de estancia.</p>
                </div>
              </div>
            )}

            {resultado && (
              <div className="result">
                <div className="result-top">
                  <div>
                    <small>Código verificado</small>
                    <h2>Asignación de empresa</h2>
                  </div>
                  <div className="badge">Acceso correcto</div>
                </div>

                <div className="grid">
                  <div className="box">
                    <h4>Empresa</h4>
                    <p>{resultado.empresa || "Pendiente de asignación"}</p>
                  </div>
                  <div className="box">
                    <h4>Dirección</h4>
                    <p>{resultado.direccion || "Pendiente de completar"}</p>
                  </div>
                  <div className="box">
                    <h4>Horario</h4>
                    <p>{resultado.horario || "Pendiente de completar"}</p>
                  </div>
                </div>
              </div>
            )}

            {buscado && !resultado && (
              <div className="error">
                <strong>Código no válido</strong>
                <div style={{ marginTop: "8px" }}>
                  Revisa que el código esté bien escrito y vuelve a intentarlo.
                </div>
              </div>
            )}

            <div className="footer-box">
              Introduce únicamente el código que te ha entregado el centro.
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
