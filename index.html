<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>4º ESO + Empresa</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{
font-family: Arial;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
background:white;
padding:40px;
border-radius:10px;
width:400px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
}

button{
padding:10px 15px;
margin-right:5px;
}
</style>

</head>
<body>

<div id="root"></div>

<script type="text/babel">

function App(){

const alumnos = {
"1":{empresa:"Centro Salud Loeches",direccion:"Calle Virgen de las Angustias s/n, Loeches",horario:"23/03 09:00-14:00 | 24/03 09:00-14:00 | 25/03 09:00-14:00"},
"6":{empresa:"TAFAD Madrid",direccion:"Av. Cristóbal Colón 54",horario:"23/03-26/03 08:30-14:30"},
"16":{empresa:"Frimagón",direccion:"Carretera Loeches-Alcalá 1",horario:"Lunes-Jueves 09:00-13:00"},
"29":{empresa:"UPM ETSIT",direccion:"Av. Complutense 30 Madrid",horario:"24/03-26/03 10:00-14:00"},
"34":{empresa:"Eurovía",direccion:"C/ Madrid 12 Torrejón",horario:"23/03-26/03 09:00-14:00 y 15:00-17:00"},
"41":{empresa:"Clínica Dental Nexus",direccion:"C/ Circunvalación 2 Torrejón",horario:"23/03-26/03 16:00-19:00"}
};

const[numero,setNumero]=React.useState("");
const[resultado,setResultado]=React.useState(null);

function buscar(){
setResultado(alumnos[numero] || null);
}

return(
<div className="app">

<h2>4º ESO + Empresa</h2>

<p>Introduce tu número</p>

<input
value={numero}
onChange={(e)=>setNumero(e.target.value)}
placeholder="Ejemplo: 12"
/>

<button onClick={buscar}>Consultar</button>

{resultado && (
<div>
<h3>Empresa</h3>
<p>{resultado.empresa}</p>

<h3>Dirección</h3>
<p>{resultado.direccion}</p>

<h3>Horario</h3>
<p>{resultado.horario}</p>
</div>
)}

</div>
);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>

</body>
</html>
